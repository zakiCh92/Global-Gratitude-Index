<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مقياس الامتنان والامتياز العالمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;750;900&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>
<body class="bg-[#05050a] text-slate-100 min-h-screen relative overflow-x-hidden">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // تفكيك الأيقونات من المكتبة العالمية
        const { 
          Shield, Heart, DollarSign, Smile, Globe, TrendingUp, 
          Sparkles, Share2, RotateCcw, Check, X, Award, 
          Lightbulb, ArrowLeft, Zap, BookOpen, Lock, Mail 
        } = LucideReact;

        const QUESTIONS = [
          { id: 'q1', category: 'survival', text: 'هل يتوفر لديك مياه صالحة للشرب ونظيفة داخل منزلك مباشرة دون عناء؟', globalHas: 74, weight: 1.5, details: 'حوالي 26% من سكان العالم لا يملكون مياهاً صالحة للشرب في منازلهم.' },
          { id: 'q2', category: 'survival', text: 'هل تناولت وجبتك الأخيرة في موعدها وبشكل كافٍ ودون خوف دائم من الجوع؟', globalHas: 90, weight: 1.5, details: 'يعاني حوالي 10% من سكان العالم (نحو 800 مليون شخص) من نقص التغذية الحاد والجوع المستمر.' },
          { id: 'q3', category: 'survival', text: 'هل تمتلك أو تستأجر مسكناً آمناً يحميك من تقلبات الطقس القاسية؟', globalHas: 80, weight: 1.4, details: 'يعيش أكثر من 20% من البشر في مساكن عشوائية أو غير ملائمة كلياً.' },
          { id: 'q4', category: 'survival', text: 'هل تعيش في منطقة آمنة ومستقرة تماماً، بعيداً عن الحروب والنزاعات المسلحة؟', globalHas: 88, weight: 1.5, details: 'يعيش حوالي 12% من سكان الكوكب حالياً في مناطق متأثرة بشكل مباشر بالحروب والصراعات.' },
          { id: 'q5', category: 'survival', text: 'هل تعيش دون التعرض لأي تهديد مباشر أو اضطهاد مستمر يهدد سلامتك الشخصية؟', globalHas: 85, weight: 1.4, details: 'يتعرض مئات الملايين حول العالم للاضطهاد السياسي أو العرقي أو التهديد الأمني المستمر.' },
          { id: 'q6', category: 'survival', text: 'هل الطقس والمناخ البيئي الذي تعيش فيه مناسب ومعتدل أغلب العام؟', globalHas: 75, weight: 0.9, details: 'يعيش ربع سكان الأرض في مناطق تعاني من تطرف مناخي شديد أو جفاف حاد مهدد للحياة.' },
          { id: 'q7', category: 'health', text: 'هل تجيد القراءة والكتابة بسلاسة (تلقيت تعليماً أساسياً)؟', globalHas: 87, weight: 1.2, details: 'معدل الأمية العالمي يبلغ حوالي 13% بين البالغين، معظمهم من النساء.' },
          { id: 'q8', category: 'health', text: 'هل أنت معافى من الأمراض المزمنة الشديدة أو الإعاقات التي تعيقك عن ممارسة حياتك الطبيعية؟', globalHas: 80, weight: 1.2, details: 'يعاني حوالي 20% من البشر من إعاقات جسدية أو أمراض مزمنة تحد من حركتهم وقدراتهم اليومية.' },
          { id: 'q9', category: 'health', text: 'هل أكملت مرحلة التعليم الثانوي أو ما يعادلها على الأقل؟', globalHas: 50, weight: 1.0, details: 'نصف سكان العالم فقط يحصلون على فرصة لإكمال التعليم الثانوي وما بعده.' },
          { id: 'q10', category: 'health', text: 'هل يمكنك الوصول بسهولة إلى رعاية صحية جيدة وميسورة التكلفة عند المرض? ', globalHas: 60, weight: 1.2, details: 'أكثر من 40% من البشر يفتقرون كلياً للخدمات الصحية الأساسية دون التعرض لإفلاس مالي.' },
          { id: 'q11', category: 'health', text: 'هل يتوفر لديك تيار كهربائي مستقر ومستمر دون انقطاع طويل في مسكنك؟', globalHas: 75, weight: 1.1, details: 'رغم تمديد شبكات الكهرباء، يعاني ربع سكان الأرض من انقطاعات مستمرة تعوق الحياة والإنتاج.' },
          { id: 'q12', category: 'finance', text: 'هل لديك عمل مستقر، أو مصدر دخل ثابت (وظيفة، تجارة، عمل حر)؟', globalHas: 60, weight: 1.1, details: 'أكثر من 40% من القوة العاملة العالمية تعمل في القطاع غير الرسمي وبلا أي أمان وظيفي.' },
          { id: 'q13', category: 'finance', text: 'هل تتلقى دخلاً أو راتباً يكفي لتغطية كامل احتياجاتك الأساسية ويزيد قليلاً؟', globalHas: 50, weight: 1.2, details: 'يعيش نصف سكان العالم تقريباً على أقل من 6.85 دولار يومياً (خط الفقر المتوسط للبنك الدولي).' },
          { id: 'q14', category: 'finance', text: 'هل تمتلك مدخرات مالية تضمن لك العيش لـ 3 أشهر على الأقل في حال توقف دخلك فجأة؟', globalHas: 35, weight: 1.1, details: 'قرابة 65% من سكان العالم يعيشون يوماً بيوم وبلا أي مدخرات حقيقية لمواجهة الطوارئ.' },
          { id: 'q15', category: 'finance', text: 'هل تحب مجال عملك أو دراستك الحالية وتشعر بالرضا المهني فيه؟', globalHas: 45, weight: 0.8, details: 'تظهر الاستطلاعات العالمية أن أقل من نصف العاملين يشعرون بالارتباط والشغف تجاه وظائفهم الحالية.' },
          { id: 'q16', category: 'social', text: 'هل عائلتك أو المقربون منك يعيشون معك أو على تواصل دائم لتقديم الدعم المعنوي والاجتماعي؟', globalHas: 85, weight: 0.9, details: 'يعاني نحو 15% من البشر من العزلة الاجتماعية التامة أو فقدان شبكات الدعم العائلي الأساسية.' },
          { id: 'q17', category: 'social', text: 'هل تعيش في حي أو مدينة تحبها وتشعر بالانتماء النفسي والراحة فيها؟', globalHas: 65, weight: 0.8, details: 'يضطر الكثيرون للسكن في بيئات لا يرغبونها لأسباب اقتصادية أو قسرية.' },
          { id: 'q18', category: 'social', text: 'هل تنال قسطاً كافياً ومناسباً من النوم والراحة اليومية دون أرق أو إرهاق مزمن؟', globalHas: 70, weight: 0.8, details: 'يعاني نحو 30% من سكان الأرض من اضطرابات النوم والتوتر النفسي الناتج عن ضغوط المعيشة.' },
          { id: 'q19', category: 'social', text: 'هل تحصل على عطلة أسبوعية منتظمة تتيح لك الاسترخاء ومزاولة حياتك الشخصية؟', globalHas: 65, weight: 0.8, details: 'يعمل ملايين البشر طوال أيام الأسبوع دون توقف أو إجازات مدفوعة الأجر للبقاء على قيد الحياة.' },
          { id: 'q20', category: 'social', text: 'هل تشعر بالتفاؤل والأمل الإيجابي تجاه مستقبلك ومستقبل عائلتك القريب؟', globalHas: 55, weight: 0.8, details: 'يسود القلق الاقتصادي والتغيرات العالمية على النظرة المستقبلية لقرابة نصف سكان العالم.' },
          { id: 'q21', category: 'luxury', text: 'هل لديك وسيلة نقل خاصة (سيارة، دراجة) أو شبكة مواصلات عامة مريحة وسهلة في محيطك؟', globalHas: 70, weight: 0.8, details: 'يواجه حوالي 30% من البشر صعوبات بالغة وهدراً للوقت والجهد في التنقل اليومي لغياب البنية التحتية.' },
          { id: 'q22', category: 'luxury', text: 'هل تمتلك جواز سفر ساري المفعول في درجك الآن؟', globalHas: 40, weight: 0.9, details: 'أقل من 40% من سكان العالم يمتلكون بالفعل جواز سفر يتيح لهم التفكير في مغادرة البلاد.' },
          { id: 'q23', category: 'luxury', text: 'هل تسافر دولياً بحرية (أو قادراً مادياً وقانونياً على السفر بغرض الترفيه)؟', globalHas: 25, weight: 0.9, details: 'السفر الدولي الترفيهي ميزة حصرية ومترفة تقتصر على ربع سكان الكوكب فقط.' },
          { id: 'q24', category: 'luxury', text: 'هل يمكنك ممارسة شعائرك الدينية وقناعاتك الفكرية بحرية كاملة ودون خوف من التضييق؟', globalHas: 65, weight: 1.0, details: 'يعيش حوالي 35% من سكان العالم في دول تفرض قيوداً حكومية أو مجتمعية شديدة على الحرية الدينية والفكرية.' },
          { id: 'q25', category: 'luxury', text: 'هل لديك اتصال مستقر وسريع بشبكة الإنترنت في منزلك أو عبر هاتفك الذكي؟', globalHas: 67, weight: 1.0, details: 'لا يزال قرابة 33% من سكان العالم (حوالي 2.7 مليار شخص) يفتقرون تماماً للاتصال بالإنترنت.' },
          { id: 'q26', category: 'luxury', text: 'هل تمتلك هاتفاً ذكياً حديثاً أو جهاز كمبيوتر خاصاً بك؟', globalHas: 70, weight: 0.7, details: 'نحو 30% من سكان الكوكب لا يملكون أجهزة ذكية تمكنهم من ولوج الفضاء المعرفي الحديث.' },
          { id: 'q27', category: 'luxury', text: 'هل لديك الوقت الكافي والقدرة المالية لممارسة هوايتك المفضلة (رياضة، قراءة، فن، ألعاب)؟', globalHas: 40, weight: 0.7, details: 'تمنع مشاق الحياة اليومية والعمل المرهق الطويل أكثر من 60% من البشر من الاستمتاع بأي هواية ترفيهية.' }
        ];

        const CATEGORIES = {
          survival: { title: 'الأساسيات والبقاء', icon: Shield, color: 'from-rose-500 to-red-600', textLight: 'text-rose-400' },
          health: { title: 'الصحة والتعليم', icon: Heart, color: 'from-emerald-500 to-teal-600', textLight: 'text-emerald-400' },
          finance: { title: 'المال والعمل', icon: DollarSign, color: 'from-amber-500 to-orange-600', textLight: 'text-amber-400' },
          social: { title: 'الحياة الاجتماعية والرفاهية النفسية', icon: Smile, color: 'from-indigo-500 to-violet-600', textLight: 'text-indigo-400' },
          luxury: { title: 'الرفاهية والاتصال والحرية', icon: Globe, color: 'from-purple-500 to-fuchsia-600', textLight: 'text-purple-400' }
        };

        const PRESETS = [
          {
            name: 'اللاجئ (منطقة صراع قاسية)',
            description: 'شخص يعيش في مخيمات النزوح في بيئة تفتقر لأبسط مقومات الأمان والرفاهية المادية.',
            answers: {
              q1: false, q2: false, q3: false, q4: false, q5: false, q6: false,
              q7: true, q8: false, q9: false, q10: false, q11: false,
              q12: false, q13: false, q14: false, q15: false,
              q16: true, q17: false, q18: false, q19: false, q20: false,
              q21: false, q22: false, q23: false, q24: false, q25: false, q26: false, q27: false
            }
          },
          {
            name: 'المواطن المتوسط (دولة نامية)',
            description: 'يعيش في بيئة مستقرة أمنياً ولكن يواجه صعوبات اقتصادية وتحديات في السفر والمدخرات والترفيه.',
            answers: {
              q1: true, q2: true, q3: true, q4: true, q5: true, q6: true,
              q7: true, q8: true, q9: true, q10: false, q11: true,
              q12: true, q13: false, q14: false, q15: true,
              q16: true, q17: true, q18: true, q19: true, q20: true,
              q21: true, q22: false, q23: false, q24: true, q25: true, q26: true, q27: false
            }
          },
          {
            name: 'الموظف الميسور (دولة مستقرة ومتقدمة)',
            description: 'يتمتع بأعلى درجات الرفاهية الرقمية، الأمان الوظيفي، والحرية الشخصية العالية.',
            answers: {
              q1: true, q2: true, q3: true, q4: true, q5: true, q6: true,
              q7: true, q8: true, q9: true, q10: true, q11: true,
              q12: true, q13: true, q14: true, q15: true,
              q16: true, q17: true, q18: true, q19: true, q20: true,
              q21: true, q22: true, q23: true, q24: true, q25: true, q26: true, q27: true
            }
          }
        ];

        function App() {
          const [screen, setScreen] = useState('intro'); 
          const [answers, setAnswers] = useState({});
          const [activeCategory, setActiveCategory] = useState('survival');
          const [copiedNotification, setCopiedNotification] = useState(false);
          const [presetUsed, setPresetUsed] = useState(null);
          const [worldPopulation, setWorldPopulation] = useState(8312456712);

          useEffect(() => {
            const interval = setInterval(() => {
              setWorldPopulation((prev) => prev + (2.62 * 0.1));
            }, 100);
            return () => clearInterval(interval);
          }, []);

          const calculation = useMemo(() => {
            let userScore = 0;
            let maxScore = 0;

            QUESTIONS.forEach((q) => {
              const privilegeScore = (100 - q.globalHas) * q.weight;
              maxScore += privilegeScore;
              if (answers[q.id] === true) userScore += privilegeScore;
            });

            let percentage = maxScore > 0 ? (userScore / maxScore) * 100 : 0;
            if (percentage > 99.9) percentage = 99.9;
            if (percentage < 0.1 && Object.keys(answers).length > 0) percentage = 0.5;

            const categoryStats = Object.keys(CATEGORIES).reduce((acc, catKey) => {
              const catQuestions = QUESTIONS.filter(q => q.category === catKey);
              let catUser = 0;
              let catMax = 0;
              
              catQuestions.forEach(q => {
                const val = (100 - q.globalHas) * q.weight;
                catMax += val;
                if (answers[q.id] === true) catUser += val;
              });

              acc[catKey] = {
                title: CATEGORIES[catKey].title,
                percentage: catMax > 0 ? Math.round((catUser / catMax) * 100) : 0,
                answeredCount: catQuestions.filter(q => answers[q.id] !== undefined).length,
                totalCount: catQuestions.length
              };
              return acc;
            }, {});

            return {
              percentage: parseFloat(percentage.toFixed(1)),
              betterOffPeopleCount: Math.floor(worldPopulation * (percentage / 100)),
              categoryStats
            };
          }, [answers, worldPopulation]);

          const totalQuestions = QUESTIONS.length;
          const answeredQuestionsCount = Object.keys(answers).length;
          const progressPercent = Math.round((answeredQuestionsCount / totalQuestions) * 100);

          const handleAnswer = (questionId, value) => {
            setAnswers(prev => ({ ...prev, [questionId]: value }));
            setPresetUsed(null);
          };

          const handleSelectAllInActiveCategory = (value) => {
            const activeQuestions = QUESTIONS.filter(q => q.category === activeCategory);
            const updated = { ...answers };
            activeQuestions.forEach(q => { updated[q.id] = value; });
            setAnswers(updated);
            setPresetUsed(null);
          };

          const handleUsePreset = (preset) => {
            setAnswers(preset.answers);
            setPresetUsed(preset.name);
            setScreen('results');
          };

          const handleReset = () => {
            setAnswers({});
            setScreen('intro');
            setActiveCategory('survival');
            setPresetUsed(null);
          };

          const handleAutoFillRemaining = (value) => {
            const updated = { ...answers };
            QUESTIONS.forEach(q => {
              if (updated[q.id] === undefined) updated[q.id] = value;
            });
            setAnswers(updated);
          };

          const handleShare = () => {
            const textToCopy = `إحصائية مذهلة ومؤثرة! 🌍\nقمت بإجراء اختبار "Global Gratitude Scale" وكانت النتيجة:\nأنا أعيش في ظروف معيشية أفضل من ${calculation.percentage}% من سكان الأرض (أي أفضل من قرابة ${Math.floor(calculation.betterOffPeopleCount).toLocaleString('en-US')} إنسان حي حالياً).\nالحمد لله على النعم غير المرئية. جرب بنفسك الآن!`;
            const el = document.createElement('textarea');
            el.value = textToCopy;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            setCopiedNotification(true);
            setTimeout(() => setCopiedNotification(false), 3000);
          };

          const userRarePrivileges = useMemo(() => {
            return QUESTIONS.filter(q => answers[q.id] === true)
              .sort((a, b) => a.globalHas - b.globalHas)
              .slice(0, 4);
          }, [answers]);

          return (
            <div className="min-h-screen text-slate-100 font-sans antialiased selection:bg-emerald-500 selection:text-black">
              <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(16,185,129,0.04),transparent_45%)] pointer-events-none" />
              <div className="absolute inset-0 bg-[radial-gradient(circle_at_bottom_left,rgba(99,102,241,0.05),transparent_50%)] pointer-events-none" />

              <header className="sticky top-0 z-40 bg-[#05050a]/90 backdrop-blur-md border-b border-slate-900 px-4 py-3">
                <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-2">
                  <div className="flex items-center gap-2">
                    <span className="relative flex h-2.5 w-2.5">
                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                    </span>
                    <span className="text-xs text-slate-400 font-mono tracking-wider">مُؤشرات كوكبية حية (2026)</span>
                  </div>

                  <div className="flex flex-wrap gap-4 md:gap-8 justify-center text-sm">
                    <div>
                      <span className="text-slate-400 ml-1.5">تعداد البشر التقديري:</span>
                      <span className="font-mono text-emerald-400 font-bold text-base">
                        {Math.floor(worldPopulation).toLocaleString('en-US')}
                      </span>
                    </div>

                    {screen === 'results' || answeredQuestionsCount > 0 ? (
                      <div className="animate-fadeIn">
                        <span className="text-slate-400 ml-1.5">أنت تعيش أفضل من:</span>
                        <span className="font-mono text-indigo-400 font-bold text-base">
                          {Math.floor(calculation.betterOffPeopleCount).toLocaleString('en-US')}
                        </span>
                        <span className="text-xs text-slate-500 mr-1.5 font-semibold">({calculation.percentage}%)</span>
                      </div>
                    ) : (
                      <div className="text-slate-500 italic text-xs">أجب عن الأسئلة لتفعيل عداد الامتنان الشخصي</div>
                    )}
                  </div>
                </div>
              </header>

              <main className="max-w-5xl mx-auto px-4 py-8 relative">
                <div className="text-center mb-10">
                  <h1 className="text-3xl md:text-5xl font-black bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 via-teal-200 to-indigo-400 mb-2 leading-normal">
                    مقياس الامتنان والامتياز العالمي
                  </h1>
                  <p className="text-slate-400 max-w-2xl mx-auto text-sm md:text-base leading-relaxed">
                    مبني على خوارزمية توازن الأوزان المعيشية ونسب الإحصاء السكاني من منظمات التنمية العالمية. أين تقع ظروف حياتك الحقيقية بين ثنايا كوكب الأرض؟
                  </p>
                </div>

                {screen === 'intro' && (
                  <div className="space-y-8">
                    <div className="bg-gradient-to-br from-slate-900 to-slate-950 rounded-2xl border border-slate-800 p-6 md:p-10 shadow-2xl relative overflow-hidden">
                      <div className="max-w-3xl mx-auto text-center space-y-6">
                        <div className="inline-flex items-center justify-center p-3 bg-emerald-500/10 text-emerald-400 rounded-full mb-2 border border-emerald-500/20">
                          <Sparkles className="w-8 h-8" />
                        </div>
